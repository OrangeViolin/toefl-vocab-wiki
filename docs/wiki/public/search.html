<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全文检索 - {{Wiki Name}}</title>
<link rel="stylesheet" href="css/main.css">
<script>!function(){var l=document.createElement('link');l.rel='stylesheet';l.href='./local/local.css';document.head.appendChild(l)}()</script>
<style>
.fts-page { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }
.fts-page h1 { font-size: 1.35rem; margin-bottom: .8rem; color: var(--fg); }
.fts-page .nav-back { display: inline-block; margin-bottom: 1rem; color: var(--accent); text-decoration: none; font-size: .9rem; }
.fts-page .nav-back:hover { color: var(--accent); text-decoration: underline; filter: brightness(1.3); }
.fts-form { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
.fts-form input { flex: 1; padding: .6rem .9rem; font-size: 1rem; border: 1px solid var(--border); border-radius: 2px; background: var(--bg-box); color: var(--fg); transition: border-color .15s; }
.fts-form input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 25%, transparent); }
.fts-form input::placeholder { color: var(--fg-muted); opacity: .6; }
.fts-btn { padding: .6rem 1.2rem; background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); border: 1px solid var(--border); border-radius: 2px; font-size: .95rem; cursor: pointer; transition: background .15s; }
.fts-btn:hover { background: color-mix(in srgb, var(--accent) 25%, transparent); }
.fts-summary { margin-bottom: .8rem; color: var(--fg-muted); font-size: .85rem; }
.fts-loading, .fts-empty { text-align: center; padding: 3rem 0; color: var(--fg-muted); font-size: .95rem; }
.fts-hit { display: block; padding: .75rem .6rem; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--fg); transition: background .1s; border-radius: 2px; }
.fts-hit:hover { background: color-mix(in srgb, var(--accent) 6%, transparent); }
.fts-hit-ch { font-size: .82rem; color: var(--fg-muted); margin-bottom: .25rem; font-weight: 500; }
.fts-hit-snip { font-size: .92rem; color: var(--fg); line-height: 1.65; }
.fts-hit-snip mark { background: color-mix(in srgb, var(--accent) 20%, transparent); color: var(--accent); padding: 0 2px; border-radius: 2px; }
.fts-pager { display: flex; justify-content: center; gap: .3rem; margin: 1.8rem 0; flex-wrap: wrap; }
.fts-pager a, .fts-pager span { display: inline-block; padding: .3rem .7rem; border: 1px solid var(--border); border-radius: 2px; font-size: .85rem; text-decoration: none; color: var(--fg-muted); transition: border-color .15s; }
.fts-pager a:hover { border-color: var(--accent); color: var(--accent); }
.fts-pager .cur { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); border-color: var(--accent); font-weight: 500; }
.fts-pager .ell { border-color: transparent; color: var(--fg-muted); }
.fts-pager .dis { opacity: .35; cursor: default; }
@media (max-width: 600px) {
  .fts-page { padding: 1rem .8rem; }
  .fts-form { flex-direction: column; }
  .fts-btn { width: 100%; }
}
</style>
</head>
<body>
<div class="fts-page">
  <a href="/" class="nav-back">← 返回首页</a>
  <h1>全文检索</h1>
  <form class="fts-form" id="fts-form">
    <input type="search" id="fts-input" placeholder="搜索原文关键词…" autocomplete="off">
    <button type="submit" class="fts-btn">检索</button>
  </form>
  <div id="fts-results"><div class="fts-loading">正在加载索引…</div></div>
</div>

<script>
const INDEX_URL = 'data/fts-index.json';
const PER_PAGE = 50;
const RADIUS = 40;

let cache = null;
let promise = null;

function loadIndex() {
  if (!promise) {
    promise = fetch(INDEX_URL).then(r => {
      if (!r.ok) throw new Error('fts-index.json 未找到 (HTTP ' + r.status + ')');
      return r.json();
    }).then(d => { cache = d; return d; });
  }
  return promise;
}

const lang = document.documentElement.lang || 'zh';

function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function qp(name) {
  const m = new RegExp('[?&]' + name + '=([^&#]*)').exec(location.search);
  return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
}

function pageNo() {
  const n = parseInt(qp('page'), 10);
  return n > 0 ? n : 1;
}

function setUrl(q, page) {
  const p = ['q=' + encodeURIComponent(q)];
  if (page > 1) p.push('page=' + page);
  history.replaceState(null, '', location.pathname + '?' + p.join('&'));
}

function searchAll(q) {
  const terms = q.trim().split(/\s+/).filter(Boolean);
  if (!terms.length) return { hits: [], terms: [] };
  const lows = terms.map(t => t.toLowerCase());
  const hits = [];
  for (const e of cache.entries) {
    const t = e.x.toLowerCase();
    let ok = true, fp = -1;
    for (const l of lows) {
      const p = t.indexOf(l);
      if (p < 0) { ok = false; break; }
      if (fp < 0 || p < fp) fp = p;
    }
    if (!ok) continue;
    const c = cache.chapters[e.c];
    hits.push({ n: c.n, id: c.f, title: c.t, pn: e.p, text: e.x, fp: fp });
  }
  hits.sort((a, b) => a.fp - b.fp);
  return { hits, terms: lows };
}

function snippet(text, terms) {
  const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp(escaped.join('|'), 'gi');
  const lower = text.toLowerCase();
  let fp = text.length;
  for (const t of terms) {
    const p = lower.indexOf(t);
    if (p >= 0 && p < fp) fp = p;
  }
  if (fp === text.length) return esc(text.slice(0, 100)) + (text.length > 100 ? '…' : '');
  const start = Math.max(0, fp - RADIUS);
  const end = Math.min(text.length, fp + RADIUS);
  let s = '';
  if (start > 0) s += '…';
  s += esc(text.slice(start, end)).replace(re, '<mark>$&</mark>');
  if (end < text.length) s += '…';
  return s;
}

function chapLabel(n) {
  const isZh = lang.startsWith('zh');
  if (n < 0) return isZh ? '前言' : 'Preface';
  if (n === 0) return isZh ? '序章' : 'Intro';
  return isZh ? '第' + n + '章' : 'Ch.' + n;
}

function render() {
  const q = qp('q');
  const input = document.getElementById('fts-input');
  const el = document.getElementById('fts-results');
  input.value = q;

  if (!q) {
    el.innerHTML = '<div class="fts-empty">请输入关键词搜索原文</div>';
    return;
  }

  loadIndex().then(() => {
    const { hits, terms } = searchAll(q);

    if (!hits.length) {
      el.innerHTML = '<div class="fts-empty">未找到匹配: <strong>' + esc(q) + '</strong></div>';
      return;
    }

    const total = hits.length;
    const pages = Math.ceil(total / PER_PAGE);
    const cur = Math.min(pageNo(), pages);
    const start = (cur - 1) * PER_PAGE;
    const slice = hits.slice(start, start + PER_PAGE);

    let html = '<div class="fts-summary">找到 <strong>' + total + '</strong> 个段落 · ' +
      '第 ' + cur + '/' + pages + ' 页 · 显示第 ' + (start + 1) + '–' +
      Math.min(start + PER_PAGE, total) + ' 条</div>';

    for (const h of slice) {
      const label = chapLabel(h.n) + ' · ' + esc(h.title.replace(/[　 ]+/g, ' '));
      const snip = snippet(h.text, terms);
      html += '<a class="fts-hit" href="/#' + encodeURIComponent(h.id) + '?pn=' + h.pn + '">' +
        '<div class="fts-hit-ch">' + label + ' · 段落 ' + h.pn + '</div>' +
        '<div class="fts-hit-snip">' + snip + '</div></a>';
    }

    if (pages > 1) {
      html += '<div class="fts-pager">';
      const encQ = encodeURIComponent(q);
      if (cur > 1) html += '<a href="?q=' + encQ + '&page=' + (cur - 1) + '">←</a>';
      else html += '<span class="dis">←</span>';
      const win = 2;
      for (let i = 1; i <= pages; i++) {
        if (i === 1 || i === pages || Math.abs(i - cur) <= win) {
          if (i === cur) html += '<span class="cur">' + i + '</span>';
          else html += '<a href="?q=' + encQ + '&page=' + i + '">' + i + '</a>';
        } else if (i === cur - win - 1 || i === cur + win + 1) {
          html += '<span class="ell">…</span>';
        }
      }
      if (cur < pages) html += '<a href="?q=' + encQ + '&page=' + (cur + 1) + '">→</a>';
      else html += '<span class="dis">→</span>';
      html += '</div>';
    }

    el.innerHTML = html;
    setUrl(q, cur);
  }).catch(err => {
    el.innerHTML = '<div class="fts-empty">索引尚未构建。请运行 <code>wiki/scripts/build_fts_index.py</code> 后重新发布。<br><small>' + esc(err.message) + '</small></div>';
  });
}

document.getElementById('fts-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const q = document.getElementById('fts-input').value.trim();
  if (q) location.href = 'search.html?q=' + encodeURIComponent(q);
});

window.addEventListener('popstate', render);
render();
</script>
</body>
</html>
