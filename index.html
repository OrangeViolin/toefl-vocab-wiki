<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>TOEFL词汇词根+联想记忆法</title>
<link rel="icon" href="data:,">

<!-- CDN 基地址：本地 js/css 404 时自动降级至此（本地开发由 serve.js fallback 接管，CDN 仅用于静态部署） -->
<meta name="cdn-base" content="https://baojie.github.io/memex/dist">

<!-- ipaddr.js：供下方 importmap 检测在无 serve.js 注入标记时按 CIDR 识别 LAN/CGNAT 客户端。
     必须同步加载于检测脚本之前（检测在解析期同步执行）。 -->
<script src="https://cdn.jsdelivr.net/npm/ipaddr.js@2/ipaddr.min.js"></script>

<!-- Import map：本地用 /plugins/（serve.js fallback），生产用 CDN
     document.write 确保 importmap 在所有 type="module" 脚本之前注入 -->
<script>
(function () {
  var h = location.hostname;
  // 运行环境优先由服务端注入的 window.__LOCAL__ 决定：serve.js 在 HTML 响应里注入
  // 运行环境优先由 serve.js 注入的 window.__LOCAL__ 决定。__LOCAL__ 为真时短路，无需 ipaddr。
  // 其次兜底：loopback 名称 + 按 CIDR 判定常见 LAN/CGNAT 段。
  // 静态部署（GitHub Pages）无 serve.js、hostname 非 IP → 全部为假 → 走 CDN。
  function isLan(ip) {
    if (!window.ipaddr || !ipaddr.isValid(ip)) return false;
    var addr = ipaddr.parse(ip);
    if (addr.kind() !== 'ipv4') return false;
    var lanRanges = {
      private10:  [ipaddr.parseCIDR('10.0.0.0/8')],
      private172: [ipaddr.parseCIDR('172.16.0.0/12')],
      private192: [ipaddr.parseCIDR('192.168.0.0/16')],
      cgnat:      [ipaddr.parseCIDR('100.64.0.0/10')],
    };
    return ipaddr.subnetMatch(addr, lanRanges, 'other') !== 'other';
  }
  var local = window.__LOCAL__ === true
    || h === 'localhost' || h === '127.0.0.1' || h === '::1'
    || isLan(h);
  var plugins = local ? '/plugins/' : 'https://baojie.github.io/memex/dist/plugins/';
  var map = '{"imports":{"@wiki/local/":"./local/","@wiki/plugins/":"' + plugins + '"}}';
  document.write('<script type="importmap">' + map + '<' + '/script>');
}());
</script>

<!-- 外部依赖（始终从 CDN 加载） -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

<!-- 引擎样式：本地开发由 serve.js 从 $MEMEX_ROOT/wiki/public/ 回退提供；静态部署时降级至 CDN -->
<!-- ⚠️ href 必须是 css/main.css，不得改为 memex.min.css。
     memex.min.css 仅在 CDN 存在，fallback 目录中没有此文件。
     写成 memex.min.css 将导致本地 dev 永远触发 onerror 加载 CDN，所有本地配置静默失效。-->
<link id="main-css" rel="stylesheet" href="css/main.css"
      onerror="var me=this;me.onerror=null;var cdn=document.querySelector('meta[name=cdn-base]').content;fetch(cdn+'/dist-version.json').then(function(r){return r.json();}).then(function(v){me.href=cdn+'/css/'+v.css;}).catch(function(){me.href=cdn+'/css/memex.min.css';});">
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="#" class="brand">TOEFL词汇词根+联想记忆法</a>
    <form class="topnav-search" id="topnav-form">
      <input id="topnav-q" name="q" type="search"
             placeholder="搜索页面…" data-i18n-placeholder="search_placeholder"
             autocomplete="off" list="topnav-pages">
      <datalist id="topnav-pages"></datalist>
    </form>
    <span id="crumb" class="crumb"></span>
    <span class="spacer"></span>
    <a href="#Special%3AAllPages" class="topnav-link" data-i18n="all_pages">所有页面</a>
    <a href="#Special%3AAll"      class="topnav-link" data-i18n="special_pages">特殊页面</a>
    <a href="#Special%3ARandom"   class="topnav-link" data-i18n="random">随机页面</a>
    <a href="#Special%3ARecent"   class="topnav-link" data-i18n="recent">最近修订</a>
    <!-- Optional: <a href="https://github.com/toefl-vocab-wiki/toefl-vocab-wiki/issues/new" class="topnav-link" target="_blank" rel="noopener">提想法</a> -->
    <!-- Optional: <a href="https://github.com/toefl-vocab-wiki/toefl-vocab-wiki" class="topnav-link" target="_blank" rel="noopener">GitHub</a> -->
    <div class="settings-wrap">
      <button id="settings-toggle" class="topnav-link topnav-btn" data-i18n="settings">设置</button>
      <div id="settings-panel" class="settings-panel" hidden>
        <label class="setting-item">
          <input type="checkbox" id="setting-autolink">
          <span data-i18n="auto_wikilink">自动链接</span>
        </label>
        <!-- i18n 插件会在此自动注入语言选择器 -->
      </div>
    </div>
    <a href="#About" class="topnav-link" data-i18n="about">关于</a>
    <span id="status" class="status"></span>
  </div>
</nav>

<main class="page" id="page-root">
  <aside class="toc-sidebar" id="toc-sidebar" hidden></aside>
  <aside class="sidebar" id="sidebar" hidden>
    <div class="infobox" id="infobox" hidden></div>
    <figure class="sidebar-portrait" id="sidebar-portrait" hidden></figure>
  </aside>
  <article id="article">
    <p class="loading" data-i18n="loading">载入中…</p>
  </article>
</main>

<!-- ⚠️ 只保留这一个 <footer>。引擎插件（page-footer 等）会在运行

    </span>

<!-- 引擎 JS：本地开发由 serve.js 从 $MEMEX_ROOT/wiki/public/ 回退提供；静态部署时降级至 CDN -->
<!-- ⚠️ src 必须是 js/core.js，不得改为 memex.min.js。
     memex.min.js 仅在 CDN 存在，本地 wiki/public/js/ 下没有此文件。
     写成 memex.min.js 将导致本地 dev 永远触发 onerror 加载 CDN 版本，
     本地源码改动静默失效，无法调试。-->
<script type="module" id="main-js" src="js/core.js"
        onerror="
          var cdn = document.querySelector('meta[name=cdn-base]').content;
          fetch(cdn + '/dist-version.json')
            .then(function(r){ return r.json(); })
            .then(function(v){
              var s = document.createElement('script');
              s.type = 'module';
              s.src = cdn + '/js/' + (v.js || 'memex.min.js');
              document.head.appendChild(s);
            })
            .catch(function(){
              var s = document.createElement('script');
              s.type = 'module';
              s.src = cdn + '/js/memex.min.js';
              document.head.appendChild(s);
            });
        "></script>
<!-- local/local.css — 动态追加以确保排在所有引擎样式之后 -->
<script>
(function() {
  var link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = './local/local.css';
  document.head.appendChild(link);
})();
</script>

<!-- Redirect bare URL to 目录 as landing page -->
<script>
if (!location.hash || location.hash === '#') {
  location.replace('#%E7%9B%AE%E5%BD%95');
}
</script>

<!-- Settings panel toggle -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var toggle = document.getElementById('settings-toggle');
  var panel  = document.getElementById('settings-panel');
  if (!toggle || !panel) return;
  toggle.addEventListener('click', function(e) {
    e.stopPropagation();
    panel.hidden = !panel.hidden;
  });
  document.addEventListener('click', function(e) {
    if (!panel.hidden && !panel.contains(e.target) && e.target !== toggle) {
      panel.hidden = true;
    }
  });
});
</script>

<!-- 搜索框自动补全 -->
<script>
fetch('pages.lite.json').then(function(r){ return r.json(); }).then(function(data){
  var dl = document.getElementById('topnav-pages');
  var pages = data.pages ? Object.values(data.pages) : [];
  var labelToId = {};
  // Only add chapter pages and overview pages to autocomplete (faster, cleaner)
  var addedCount = 0;
  var maxOptions = 200;
  pages.forEach(function(p){
    if (addedCount >= maxOptions) return;
    var isChapter = p.type === 'chapter';
    var isOverview = p.type === 'overview' || p.type === 'list';
    if (isChapter || isOverview) {
      var label = p.label || p.id || '';
      var o = document.createElement('option'); o.value = label; dl.appendChild(o);
      labelToId[label] = p.id || label;
      labelToId[p.id || label] = p.id || label;
      addedCount++;
    }
  });
  document.getElementById('topnav-form').addEventListener('submit',function(e){
    e.preventDefault();
    var v=document.getElementById('topnav-q').value.trim();
    if(!v)return;
    var pid=labelToId[v];
    location.hash=pid?encodeURIComponent(pid):encodeURIComponent('Special:AllPages')+'?s='+encodeURIComponent(v);
  });
}).catch(function(){
  document.getElementById('topnav-form').addEventListener('submit',function(e){
    e.preventDefault();
    var v=document.getElementById('topnav-q').value.trim();
    if(v) location.hash=encodeURIComponent(v);
  });
});
</script>

</body>
</html>
